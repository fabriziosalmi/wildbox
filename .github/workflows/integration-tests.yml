name: Integration Tests
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

env:
  # SECURITY: All secrets sourced from GitHub Secrets.
  # Configure these in repo Settings > Secrets and variables > Actions.
  # For initial setup, generate random values with: openssl rand -hex 32
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  API_KEY: ${{ secrets.API_KEY }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/identity
  REDIS_URL: redis://redis:6379/0
  GATEWAY_INTERNAL_SECRET: ${{ secrets.GATEWAY_INTERNAL_SECRET }}
  N8N_BASIC_AUTH_USER: admin
  N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: identity
          # Allow startup even when the secret is empty (e.g. fork PRs from the
          # fabgpt bot, which never receive repo secrets). Ephemeral CI DB only.
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          
          echo "Waiting for Redis..."
          # Use nc (netcat) instead of redis-cli which isn't available in runner
          for i in {1..30}; do
            if nc -z localhost 6379; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done

      - name: Install Identity Service Dependencies
        run: |
          pip install ./open-security-shared
          cd open-security-identity
          pip install -r requirements.txt

      - name: Run Identity Service Database Migrations
        run: |
          cd open-security-identity
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/identity

      - name: Start Identity Service
        run: |
          cd open-security-identity
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          IDENTITY_PID=$!
          echo "IDENTITY_PID=$IDENTITY_PID" >> $GITHUB_ENV
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/identity
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CREATE_INITIAL_ADMIN: "false"

      - name: Install Tools Service Dependencies
        run: |
          pip install ./open-security-shared
          cd open-security-tools
          pip install -r requirements.txt

      - name: Start Tools Service
        run: |
          cd open-security-tools
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          TOOLS_PID=$!
          echo "TOOLS_PID=$TOOLS_PID" >> $GITHUB_ENV
        env:
          API_KEY: ${{ secrets.API_KEY }}
          REDIS_URL: redis://localhost:6379/2

      - name: Install Data Service Dependencies
        run: |
          # Isolate data's deps in their own venv: it pins different
          # pydantic/fastapi/sqlalchemy versions than identity/tools, and
          # installing them into the shared env would break the already-running
          # services.
          python -m venv /tmp/data-venv
          /tmp/data-venv/bin/pip install --upgrade pip
          /tmp/data-venv/bin/pip install ./open-security-shared
          cd open-security-data
          /tmp/data-venv/bin/pip install -r requirements.txt

      - name: Start Data Service
        run: |
          cd open-security-data
          /tmp/data-venv/bin/python -m uvicorn app.api.main:app --host 127.0.0.1 --port 8002 &
          DATA_PID=$!
          echo "DATA_PID=$DATA_PID" >> $GITHUB_ENV
        env:
          # Reuse the postgres "identity" database in CI (no separate DB needed);
          # data's create_tables() lifespan hook adds its own tables on startup.
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/identity
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test

      - name: Install Responder Service Dependencies
        run: |
          # Own venv (same rationale as data): responder pins its own
          # dramatiq/redis/fastapi stack; keep it off the identity/tools env.
          python -m venv /tmp/responder-venv
          /tmp/responder-venv/bin/pip install --upgrade pip
          /tmp/responder-venv/bin/pip install ./open-security-shared
          cd open-security-responder
          /tmp/responder-venv/bin/pip install -r requirements.txt

      - name: Start Responder Service
        run: |
          # Run from the service dir so the default ./playbooks (bundled YAML)
          # loads. uvicorn alone is enough — start_execution persists the
          # initial run state to Redis synchronously, no Dramatiq worker needed.
          cd open-security-responder
          /tmp/responder-venv/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8018 &
          RESPONDER_PID=$!
          echo "RESPONDER_PID=$RESPONDER_PID" >> $GITHUB_ENV
        env:
          REDIS_URL: redis://localhost:6379/3
          ENVIRONMENT: test

      - name: Install CSPM Service Dependencies
        run: |
          # Own venv (cloud SDKs + celery pin their own deps).
          python -m venv /tmp/cspm-venv
          /tmp/cspm-venv/bin/pip install --upgrade pip
          /tmp/cspm-venv/bin/pip install ./open-security-shared
          cd open-security-cspm
          /tmp/cspm-venv/bin/pip install -r requirements.txt

      - name: Start CSPM Service
        run: |
          cd open-security-cspm
          /tmp/cspm-venv/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8019 &
          CSPM_PID=$!
          echo "CSPM_PID=$CSPM_PID" >> $GITHUB_ENV
        env:
          REDIS_URL: redis://localhost:6379/4
          CELERY_BROKER_URL: redis://localhost:6379/4
          CELERY_RESULT_BACKEND: redis://localhost:6379/4
          ENVIRONMENT: test

      - name: Wait for all services to be healthy
        run: |
          # Give services a few seconds to bind to ports
          sleep 10
          chmod +x scripts/wait-for-services.sh
          ./scripts/wait-for-services.sh
        timeout-minutes: 5
        env:
          # Only check services actually started in CI (identity, tools, data, responder, cspm)
          SERVICES: "identity:localhost:8001:/health tools:localhost:8000:/health data:localhost:8002:/health responder:localhost:8018:/health cspm:localhost:8019:/health"
          # Skip optional services in CI (they don't exist in this environment)
          OPTIONAL_SERVICES: ""

      - name: Run Integration Tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --maxfail=3 \
            -m "not slow" \
            --junit-xml=pytest-results.xml \
            -c pytest.ini
        env:
          IDENTITY_SERVICE_URL: http://localhost:8001
          TOOLS_SERVICE_URL: http://localhost:8000
          DATA_SERVICE_URL: http://localhost:8002
          RESPONDER_SERVICE_URL: http://localhost:8018
          CSPM_SERVICE_URL: http://localhost:8019
          TEST_API_KEY: ${{ secrets.API_KEY }}
        timeout-minutes: 10

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            tests/integration/reports/
            pytest-results.xml
          retention-days: 30

      - name: Stop Services
        if: always()
        run: |
          if [ ! -z "$IDENTITY_PID" ]; then kill $IDENTITY_PID || true; fi
          if [ ! -z "$TOOLS_PID" ]; then kill $TOOLS_PID || true; fi
          if [ ! -z "$RESPONDER_PID" ]; then kill $RESPONDER_PID || true; fi
          if [ ! -z "$CSPM_PID" ]; then kill $CSPM_PID || true; fi

  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Security Validation Script
        run: |
          chmod +x scripts/shell-scripts/security_validation_v2.sh
          ./scripts/shell-scripts/security_validation_v2.sh

      - name: Check for hardcoded secrets
        run: |
          # Fail if any hardcoded passwords found
          if grep -r "PASSWORD=.*[^$]" docker-compose.yml open-security-*/docker-compose.yml | grep -v "\${" | grep -v "^#"; then
            echo "❌ Hardcoded secrets detected!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Check for unpinned dependencies
        run: |
          # Check for :latest Docker tags
          if grep -r "image:.*:latest" docker-compose.yml open-security-*/docker-compose.yml | grep -v "^#"; then
            echo "❌ Unpinned Docker images detected!"
            exit 1
          fi
          echo "✅ All Docker images pinned"

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-validation-report
          path: security-validation-results.txt
          retention-days: 30
