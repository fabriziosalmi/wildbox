name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
        service:
          - identity
          - tools
          - data
          - guardian
          - responder
          - agents
          - cspm
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies for ${{ matrix.service }}
        run: |
          cd open-security-${{ matrix.service }}
          # Python services import open_security_shared; install it so unit
          # tests that touch service code can import it (harmless otherwise).
          pip install ../open-security-shared || true
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run unit tests
        run: |
          cd open-security-${{ matrix.service }}
          # Truthful gating: a service WITH unit tests must pass them (no
          # continue-on-error masking); a service WITHOUT them emits a visible
          # warning instead of a silent pytest exit-4. Coverage gaps for the
          # services that have no tests/unit/ are tracked in #245.
          if [ -d tests/unit ] && [ -n "$(find tests/unit -name 'test_*.py' -print -quit)" ]; then
            pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term
          else
            echo "::warning title=No unit tests::open-security-${{ matrix.service }} has no tests/unit/ — coverage gap tracked in #245"
          fi

      - name: Upload coverage to Codecov
        if: ${{ hashFiles(format('open-security-{0}/coverage.xml', matrix.service)) != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: ./open-security-${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}-unit
          name: ${{ matrix.service }}-unit-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: open-security-dashboard/package-lock.json
      
      - name: Install dependencies
        run: |
          cd open-security-dashboard
          npm ci
      
      - name: Install Playwright Browsers
        run: |
          cd open-security-dashboard
          npx playwright install --with-deps chromium
      
      - name: Build dashboard
        run: |
          cd open-security-dashboard
          npm run build

      - name: Run Playwright frontend smoke tests
        run: |
          cd open-security-dashboard
          # Frontend-only smoke: these specs are backend-free by design (they
          # assert the dashboard builds, the login UI renders, form validation,
          # and the client-side auth-guard redirects). Backend-dependent E2E
          # flows are tracked separately (the full stack was consolidated out).
          npx playwright test --project=chromium \
            tests/e2e/admin-ui-only.spec.ts \
            tests/e2e/quick-login-test.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: open-security-dashboard/playwright-report/
          retention-days: 30

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r open-security-*/app -f json -o bandit-report.json || true
      
      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          pip install black flake8 isort mypy
      
      - name: Run Black
        run: black --check open-security-*/app
        continue-on-error: true
      
      - name: Run Flake8
        run: flake8 open-security-*/app --max-line-length=120
        continue-on-error: true
      
      - name: Run isort
        run: isort --check-only open-security-*/app
        continue-on-error: true

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, e2e-tests]   # docker-compose integration job consolidated into integration-tests.yml
    
    strategy:
      matrix:
        service:
          - identity
          - tools
          - data
          - guardian
          - responder
          - agents
          - cspm
          - gateway
          - dashboard
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/open-security-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./open-security-${{ matrix.service }}
          build-contexts: |
            shared=open-security-shared
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
