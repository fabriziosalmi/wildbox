# Dependabot configuration — https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/open-security-*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      pip:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directories:
      - "/open-security-dashboard"
      - "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directories:
      - "/open-security-*"
      - "/tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      docker:
        patterns:
          - "*"
