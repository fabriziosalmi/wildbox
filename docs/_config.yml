# Jekyll Configuration for GitHub Pages
# Wildbox Security Platform Documentation

# Site metadata
title: Wildbox Security Platform
description: "Open-source security platform with community-driven development"
author: "Wildbox Community"
url: "https://www.wildbox.io"
baseurl: ""

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-include-cache

# Page metadata
collections_dir: collections
permalink: /:path/

# Navigation
# The site uses standalone HTML pages (index.html, docs.html, api-reference.html);
# theme header_pages navigation is not used.
header_pages: []

# Search
search_enabled: true
search:
  rel_url: true
  full_text_search: false

# Footer
footer_content: "Wildbox Security Platform &copy; 2024. Community-driven security excellence."

# Collections
collections:
  guides:
    output: true
    permalink: /:collection/:path/
  security:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      author: "Wildbox"
  - scope:
      path: "guides"
    values:
      layout: "default"
      category: "Guides"
  - scope:
      path: "security"
    values:
      layout: "default"
      category: "Security"

# Exclude files
exclude:
  - .git
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  # Internal/engineering docs kept in the repo (and referenced by SECURITY.md,
  # CI scripts, etc.) but intentionally NOT published as standalone pages on the
  # site. The live site is the HTML pages + the guides/ and security/ content
  # rendered through docs.html.
  - index.md
  - ARCHITECTURE_DECISIONS.md
  - ARCHITECTURE_STACK_JUSTIFICATION.md
  - DATA_SERVICE_API_DOCUMENTATION.md
  - DATA_SERVICE_EXPLORATION_INDEX.md
  - DATA_SERVICE_QUICK_REFERENCE.md
  - DEPENDENCY_MANAGEMENT_GUIDE.md
  - DOCUMENTATION_MIGRATION.md
  - DOCUMENTATION_QUALITY_AUDIT.md
  - DOCUMENTATION_STYLE_GUIDE.md
  - ENGINEERING_STANDARDS.md
  - ERROR_HANDLING_REFACTORING.md
  - FAANG_PATTERNS_IMPLEMENTATION.md
  - GATEWAY_AUTHENTICATION_GUIDE.md
  - GIT_COMMIT_SQUASH_GUIDE.md
  - GIT_SECURITY_AUDIT.md
  - GUARDIAN_API_ENDPOINTS.md
  - GUARDIAN_ENDPOINTS_SUMMARY.txt
  - GUARDIAN_EXPLORATION_INDEX.md
  - GUARDIAN_QUICK_REFERENCE.md
  - OBSERVABILITY_ROADMAP.md
  - PRE_COMMIT_HOOKS.md
  - SECURITY_SECRETS_ROTATION.md
  - SERVICE_CONSOLIDATION_ANALYSIS.md
  - SERVICE_LIFECYCLE.md
  - TESTING_STRATEGY.md
  - guardian/
  - api/CONTRIBUTING.md
  - api/GENERATION_GUIDE.md
  - api/README.md
  - api/TEMPLATE.md

# Enable automatic sitemap
jekyll-sitemap:
  enabled: true

# SEO
social:
  name: "Wildbox Community"
  links:
    - "https://github.com/fabriziosalmi/wildbox"

# Google Analytics (optional - add your tracking ID)
# google_analytics: "UA-XXXXXXXXX-X"

# Additional settings
timezone: UTC
encoding: UTF-8
